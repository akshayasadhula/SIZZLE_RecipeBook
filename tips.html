<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tips & Secrets — MISE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebaseConfig.js"></script>

  <link rel="stylesheet" href="viewrecipes.css" />

  <style>
    body {
      background: url('top-view-food-frame-with-copy-space.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: cursive;
      margin: 0; padding: 0;
      color: antiquewhite;
    }
    .tips-container {
      max-width: 700px; margin: 80px auto; padding: 40px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      border: 3px solid antiquewhite; border-radius: 50px; text-align: center;
    }
    .tips-container h1 { font-size: 50px; margin-bottom: 30px; color: antiquewhite; text-shadow: 4px 4px #000; }
    .tips-form input, .tips-form select {
      width: 90%; padding: 12px; margin-bottom: 20px;
      border: 2px solid antiquewhite; border-radius: 20px;
      background-color: #fff8e7; font-family: cursive; color: black;
    }
    .tips-list { list-style-type: none; text-align: left; padding: 0; margin-top: 30px; }
    .tips-list li {
      background: linear-gradient(135deg, rgba(255,235,205,0.1), rgba(255,239,213,0.2));
      border: 2px solid antiquewhite; border-radius: 25px;
      padding: 20px; margin-bottom: 15px; font-size: 18px;
      color: antiquewhite; animation: fadeIn 0.3s ease-in-out;
    }
    .tip-actions { margin-top: 10px; }
    .likeBtn, .shareTipBtn, .deleteBtn {
      background: none; border: none; color: antiquewhite;
      cursor: pointer; font-size: 16px; margin-right: 10px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* AI Tip Section */
    #aiTipSection {
      margin: 28px 0; padding: 20px;
      border: 2px dashed rgba(255,235,205,0.45);
      border-radius: 24px;
    }
    #aiTipSection h3 { font-size: 20px; margin-bottom: 14px; color: #ffe4c4; }
    #aiTipCategory {
      padding: 10px 16px; border-radius: 14px;
      border: 2px solid antiquewhite;
      background: #fff8e7; font-family: cursive; color: #000;
      font-size: 15px; margin-right: 10px;
    }
    #aiGenerateTipBtn {
      background: #000; color: antiquewhite;
      border: 2px solid antiquewhite; border-radius: 16px;
      padding: 10px 20px; font-family: cursive; font-size: 15px;
      cursor: pointer; transition: all 0.2s;
    }
    #aiGenerateTipBtn:hover { background: antiquewhite; color: #000; }
    #aiGenerateTipBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #aiTipResult {
      margin-top: 16px; padding: 14px;
      background: rgba(255,235,205,0.1);
      border: 1px solid rgba(255,235,205,0.25);
      border-radius: 18px; font-size: 16px; display: none; line-height: 1.6;
    }
    #saveAiTipBtn {
      margin-top: 10px; background: #4CAF50; color: white;
      border: none; border-radius: 14px; padding: 8px 18px;
      font-family: cursive; cursor: pointer; font-size: 14px;
    }
    #saveAiTipBtn:hover { background: #388E3C; }
  </style>
</head>
<body>

  <div class="tips-container">
    <h1>🍳 Tips & Secrets 🔥</h1>

    <!-- AI Tip Generator -->
    <div id="aiTipSection">
      <h3>✨ Generate an AI Cooking Tip</h3>
      <select id="aiTipCategory">
        <option value="Hack">Hack</option>
        <option value="Flavor">Flavor</option>
        <option value="Health">Health</option>
      </select>
      <button id="aiGenerateTipBtn">✨ Generate Tip</button>
      <div id="aiTipResult"></div>
    </div>

    <!-- Manual tip form -->
    <form id="tipForm" class="tips-form">
      <input type="text" id="tipInput" placeholder="Drop your sizzling kitchen secret..." required />
      <select id="tipCategory" required>
        <option value="" disabled selected>Select category</option>
        <option value="Hack">Hack</option>
        <option value="Flavor">Flavor</option>
        <option value="Health">Health</option>
      </select>
      <button type="submit" class="button-55 mt-3">Submit Tip</button>
    </form>

    <ul id="tipsList" class="tips-list"></ul>

    <button class="button-55 mt-5" onclick="location.href='Home.html';">⬅ Back to Home</button>
  </div>

  <script src="ai.js"></script>
  <script src="aiChat.js"></script>

  <script>
    const db = firebase.firestore();

    // Submit tip
    document.getElementById("tipForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const tipText = document.getElementById("tipInput").value.trim();
      const category = document.getElementById("tipCategory").value;
      if (tipText && category) {
        await db.collection("tips").add({
          text: tipText, category, likes: 0,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById("tipInput").value = "";
        document.getElementById("tipCategory").value = "";
      }
    });

    // Load tips
    db.collection("tips").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
      const tipsList = document.getElementById("tipsList");
      tipsList.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        const li = document.createElement("li");
        li.innerHTML = `
          <strong>🏷️ ${data.category}:</strong> ${data.text}
          <div class="tip-actions">
            <button class="likeBtn" data-id="${doc.id}">❤️ ${data.likes || 0}</button>
            <button class="shareTipBtn" data-id="${doc.id}">🔗</button>
            <button class="deleteBtn" data-id="${doc.id}">🗑️</button>
          </div>
        `;
        tipsList.appendChild(li);
      });

      document.querySelectorAll('.likeBtn').forEach(btn => {
        btn.addEventListener('click', async () => {
          await db.collection("tips").doc(btn.dataset.id).update({
            likes: firebase.firestore.FieldValue.increment(1)
          });
        });
      });

      document.querySelectorAll('.shareTipBtn').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(`${location.origin}/tips.html?id=${btn.dataset.id}`)
            .then(() => alert("✅ Tip link copied!"));
        });
      });

      document.querySelectorAll('.deleteBtn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (confirm("Delete this tip?")) {
            await db.collection("tips").doc(btn.dataset.id).delete();
          }
        });
      });
    });

    // AI Tip Generator
    let latestAiTip = null, latestAiCategory = null;

    document.getElementById('aiGenerateTipBtn').addEventListener('click', async () => {
      const category = document.getElementById('aiTipCategory').value;
      const btn = document.getElementById('aiGenerateTipBtn');
      const resultDiv = document.getElementById('aiTipResult');

      btn.disabled = true;
      btn.textContent = '⏳ Asking the chef...';
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '<em>Generating a sizzling tip... 🔥</em>';

      try {
        const tip = await SIZZLE_AI.generateTip(category);
        latestAiTip = tip;
        latestAiCategory = category;
        resultDiv.innerHTML = `
          <strong>🏷️ ${category}:</strong> ${tip}
          <br><button id="saveAiTipBtn">💾 Save this tip</button>
        `;
        document.getElementById('saveAiTipBtn').addEventListener('click', async () => {
          await db.collection("tips").add({
            text: latestAiTip, category: latestAiCategory,
            likes: 0, aiGenerated: true,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
          resultDiv.innerHTML += '<br><em style="color:#8fff8f;">✅ Saved!</em>';
          document.getElementById('saveAiTipBtn').disabled = true;
        });
      } catch (err) {
        resultDiv.innerHTML = '<span style="color:#ff8a8a;">❌ Couldn\'t generate tip. Try again!</span>';
      } finally {
        btn.disabled = false;
        btn.textContent = '✨ Generate Tip';
      }
    });
  </script>
</body>
</html>
